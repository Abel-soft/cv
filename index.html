<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder - Export PDF direct</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2f5;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 1.5rem;
        }
        .builder-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Formulaire */
        .form-panel {
            flex: 1.2;
            min-width: 320px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            padding: 1.8rem;
            height: fit-content;
            max-height: calc(100vh - 3rem);
            overflow-y: auto;
        }
        .form-panel h2 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #1e4a76;
            border-left: 5px solid #1e7e83;
            padding-left: 1rem;
        }
        .form-section {
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }
        .section-header {
            background: #f8fafc;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1rem;
            color: #0f3b5c;
        }
        .section-header:hover { background: #eef2ff; }
        .toggle-icon { transition: transform 0.2s; }
        .section-header.open .toggle-icon { transform: rotate(180deg); }
        .section-content {
            padding: 1.2rem;
            display: none;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .section-content.open { display: block; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #1e293b;
        }
        .form-group label i { color: #1e7e83; width: 1.2rem; }
        input, textarea, select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fff;
        }
        input:focus, textarea:focus { border-color: #1e7e83; outline: none; box-shadow: 0 0 0 3px rgba(30,126,131,0.1); }
        .dynamic-list { margin-top: 0.5rem; }
        .item-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 0.6rem 1rem;
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .item-card .item-info { flex: 1; font-size: 0.85rem; }
        .btn-icon {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            font-size: 1rem;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:hover { background: #fee2e2; }
        .btn-add {
            background: #e2e8f0;
            color: #1e7e83;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-primary {
            background: #1e7e83;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .btn-reset {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            margin-left: 0.5rem;
        }
        /* Aperçu CV */
        .preview-panel {
            flex: 2.5;
            min-width: 400px;
            background: #f8fafc;
            border-radius: 32px;
            padding: 1rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }
        .theme-toggle, .pdf-btn-header {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }
        /* STYLES CV (Times New Roman) */
        .cv-container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif;
        }
        .header { background: linear-gradient(135deg, #1e4a76, #0a2f44); padding: 2rem 2rem 1.8rem; color: white; }
        .header-flex { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .name-title h1 { font-size: 22pt; font-weight: bold; margin-bottom: 0.25rem; }
        .name-title p { font-size: 14pt; }
        .contact-bar { display: flex; flex-wrap: wrap; gap: 1.2rem; margin-top: 1.2rem; font-size: 11pt; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1.2rem; }
        .contact-bar a, .contact-bar span { color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .cv-main { display: grid; grid-template-columns: 1fr 2fr; gap: 0; }
        .sidebar { background: #f8fafc; padding: 2rem 1.8rem; border-right: 1px solid #e2e8f0; }
        .photo-container { text-align: center; margin-bottom: 1.8rem; position: relative; }
        .photo-container img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .import-photo-btn { background: #1e7e83; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; margin-top: 8px; }
        .photo-hint { font-size: 10pt; margin-top: 5px; opacity: 0.7; }
        .section { margin-bottom: 1.8rem; }
        .section h3 { font-size: 14pt; font-weight: bold; margin-bottom: 0.8rem; color: #0f3b5c; border-left: 4px solid #1e7e83; padding-left: 12px; }
        .qualities { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .qualities span { background: #e2e8f0; padding: 4px 12px; border-radius: 30px; font-size: 11pt; }
        .content { padding: 2rem 2rem; }
        .timeline-item { margin-bottom: 1rem; }
        .timeline-title { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: nowrap; font-weight: bold; font-size: 12pt; margin-bottom: 0.2rem; }
        .timeline-date { font-weight: normal; font-size: 12pt; white-space: nowrap; margin-left: 1rem; }
        .timeline-sub { font-weight: normal; font-size: 12pt; margin: 0.2rem 0 0.4rem; color: #2c3e50; }
        .timeline-desc { font-size: 12pt; margin-top: 6px; padding-left: 0; list-style: none; }
        .timeline-desc li { margin-bottom: 4px; position: relative; padding-left: 18px; }
        .timeline-desc li::before { content: "▹"; position: absolute; left: 0; color: #1e7e83; }
        .training-item { margin-bottom: 0.6rem; font-size: 12pt; }
        .footer-note { text-align: center; font-size: 10pt; padding: 1rem; background: #f1f5f9; color: #475569; }
        @media (max-width: 780px) { .builder-container { flex-direction: column; } .cv-main { grid-template-columns: 1fr; } }

        /* Thème sombre (écran) */
        body.dark { background: #121826; }
        body.dark .form-panel, body.dark .preview-panel { background: #1e2936; color: #e0e4e8; }
        body.dark .section-header { background: #0f172a; color: #7bc5d1; }
        body.dark .section-content { background: #1e2936; border-color: #2d3a48; }
        body.dark input, body.dark textarea { background: #0f172a; border-color: #475569; color: white; }
        body.dark .item-card { background: #0f172a; border-color: #2d3a48; color: #cbd5e1; }
        body.dark .btn-add { background: #334155; color: #7bc5d1; }
        body.dark .cv-container { background: #1e2936; }
        body.dark .sidebar { background: #0f172a; border-right-color: #2d3a48; }
        body.dark .qualities span { background: #2d3748; color: #e0e4e8; }
        body.dark .footer-note { background: #0f172a; color: #94a3b8; }
    </style>
</head>
<body>
<div class="builder-container">
    <div class="form-panel">
        <h2><i class="fas fa-pen-ruler"></i> Éditeur CV Pro</h2>
        <form id="cvForm">
            <div class="form-section"><div class="section-header"><span><i class="fas fa-id-card"></i> Identité & Contact</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content">
                    <div class="form-group"><label><i class="fas fa-user"></i> Nom complet</label><input type="text" id="fullName" value="RAHAJASON Feno Arthur"></div>
                    <div class="form-group"><label><i class="fas fa-briefcase"></i> Titre</label><input type="text" id="title" value="Enseignant Chercheur – Université de Mahajanga"></div>
                    <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> Adresse</label><input type="text" id="address" value="UFRSS site MANDRITSARA – IM: 493 992"></div>
                    <div class="form-group"><label><i class="fas fa-phone-alt"></i> Tél. 1</label><input type="text" id="phone1" value="032 53 581 16"></div>
                    <div class="form-group"><label><i class="fas fa-mobile-alt"></i> Tél. 2</label><input type="text" id="phone2" value="032 46 854 56"></div>
                    <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" id="email" value="fenoarthur24@gmail.com"></div>
                    <div class="form-group"><label><i class="fas fa-globe"></i> Nationalité</label><input type="text" id="nationality" value="Malgache"></div>
                </div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-user-graduate"></i> Profil</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><textarea id="profile" rows="3">Docteur en Sciences de la Vie et de l’Environnement, enseignant chercheur expérimenté. Expertise en gestion des déchets, assainissement, développement durable et gouvernance associative. Dynamique, organisé et engagé pour la recherche et la formation.</textarea></div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-language"></i> Langues & Dialectes</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content">
                    <div class="form-group"><label>Langues (virgules)</label><textarea id="languages" rows="2">Malgache – langue maternelle, Français – parlé et écrit courant, Anglais – notions</textarea></div>
                    <div class="form-group"><label>Dialectes</label><input type="text" id="dialects" value="Betsimisaraka, Tsimihety, Merina, Sakalava"></div>
                </div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-laptop-code"></i> Compétences info</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><textarea id="skills" rows="2">Word, Excel, PowerPoint, Internet, outils de télé-enseignement, Gestion de projets associatifs</textarea></div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-heart"></i> Qualités</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><input type="text" id="qualities" value="Ordonné, Sérieux, Dynamique, Ponctuel, Esprit d'équipe"></div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-car"></i> Permis</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><input type="text" id="permis" value="Catégories A, B, D – véhicule"></div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-briefcase"></i> Expériences</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><div id="experiences-list" class="dynamic-list"></div><button type="button" id="addExperienceBtn" class="btn-add"><i class="fas fa-plus"></i> Ajouter</button></div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-graduation-cap"></i> Formations académiques</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><div id="educations-list" class="dynamic-list"></div><button type="button" id="addEducationBtn" class="btn-add"><i class="fas fa-plus"></i> Ajouter</button></div>
            </div>
            <div class="form-section"><div class="section-header"><span><i class="fas fa-chalkboard-user"></i> Formations complémentaires</span><i class="fas fa-chevron-down toggle-icon"></i></div>
                <div class="section-content"><div id="trainings-list" class="dynamic-list"></div><button type="button" id="addTrainingBtn" class="btn-add"><i class="fas fa-plus"></i> Ajouter</button></div>
            </div>
            <div><button type="button" id="resetBtn" class="btn-primary btn-reset"><i class="fas fa-undo-alt"></i> Réinitialiser</button></div>
        </form>
    </div>
    <div class="preview-panel">
        <div class="preview-header">
            <h3><i class="fas fa-eye"></i> Aperçu (Times New Roman)</h3>
            <div><button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i> Thème</button><button id="exportPDFBtn" class="pdf-btn-header"><i class="fas fa-file-pdf"></i> Télécharger PDF</button></div>
        </div>
        <div id="cvContainer"></div>
    </div>
</div>

<script>
    // Données par défaut
    let experiences = [
        { title: "Enseignant Chercheur", date: "depuis 2023", institution: "Ministère de l’Enseignement Supérieur et de la Recherche Scientifique", details: [] },
        { title: "Enseignant vacataire", date: "depuis 2017", institution: "UFRSS site Mandritsara – Université de Mahajanga", details: [] },
        { title: "Chef de Centre Régional", date: "2021 – 2024", institution: "CNTEMAD – Mandritsara", details: [] },
        { title: "Assistant d’Enseignement Supérieur et de Recherche", date: "2016 – 2017", institution: "UFRSS Université de Mahajanga site Mandritsara", details: [] },
        { title: "Président", date: "2014", institution: "AUProG (Association des Universitaires pour la Promotion du Genre)", details: [] },
        { title: "Agent enquêteur / recenseur", date: "2012 – 2013", institution: "IRCOD, Direction Inter-régionale de la Statistique, CENI-T", details: ["Inventaire des latrines publiques (Assainissement)", "Enquête de Surveillance Comportementale VIH/Sida région SOFIA", "Agent recenseur électoral"] }
    ];
    let educations = [
        { title: "Doctorat en Sciences de la Vie et de l’Environnement", date: "2017 – 2025 (soutenu)", institution: "École Doctorale du Génie du Vivant et de la Modélisation, Université de Mahajanga" },
        { title: "DEA en Sciences de la Vie et de l’Environnement", date: "2013 – 2014", institution: "Université de Mahajanga" },
        { title: "Maîtrise en Sciences de la Vie et de l’Environnement", date: "2011 – 2013", institution: "Université de Mahajanga" },
        { title: "Licence ès Sciences", date: "2009 – 2010", institution: "Université de Mahajanga" },
        { title: "Baccalauréat Série D", date: "2006", institution: "Lycée Mixte d’Antalaha" }
    ];
    let trainings = [
        "2014 – Gestion et valorisation des déchets urbains (Société Madagascar SARL)",
        "2014 – Échange avec leaders politiques et organisations féminines (EISA)",
        "2014 – Gouvernance associative et montage de plan d’actions (EISA)",
        "2013 – Formation des formateurs – Genre et participation citoyenne (EISA)",
        "2013 – Traitement de l’eau (JIRAMA Antalaha)",
        "2012 – Gestion des déchets et assainissement urbain (Commune urbaine de Mahajanga)",
        "2012 – Assainissement urbain et développement durable (Université de Mahajanga, STTD)",
        "2010 – Laboratoire d’analyse biochimie et microbiologie (CHD Antalaha & Andapa)"
    ];
    let profilePhotoSrc = "https://via.placeholder.com/140?text=Photo";
    const cvContainer = document.getElementById('cvContainer');
    let currentTheme = localStorage.getItem('theme') || 'light';

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    function renderCV() {
        const fullName = document.getElementById('fullName').value;
        const title = document.getElementById('title').value;
        const address = document.getElementById('address').value;
        const phone1 = document.getElementById('phone1').value;
        const phone2 = document.getElementById('phone2').value;
        const email = document.getElementById('email').value;
        const nationality = document.getElementById('nationality').value;
        const profile = document.getElementById('profile').value;
        const languagesRaw = document.getElementById('languages').value;
        const dialects = document.getElementById('dialects').value;
        const skillsRaw = document.getElementById('skills').value;
        const qualitiesRaw = document.getElementById('qualities').value;
        const permis = document.getElementById('permis').value;
        const languagesArray = languagesRaw.split(',').map(l => l.trim());
        const skillsArray = skillsRaw.split(',').map(s => s.trim());
        const qualitiesArray = qualitiesRaw.split(',').map(q => q.trim());

        let html = `
            <div class="cv-container">
                <div class="header">
                    <div class="header-flex"><div class="name-title"><h1>${escapeHtml(fullName)}</h1><p>${escapeHtml(title)}</p></div><div class="header-buttons" style="display:none;"></div></div>
                    <div class="contact-bar">
                        <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(address)}</span>
                        <a href="tel:${phone1.replace(/\s/g,'')}"><i class="fas fa-phone-alt"></i> ${escapeHtml(phone1)}</a>
                        <a href="tel:${phone2.replace(/\s/g,'')}"><i class="fas fa-mobile-alt"></i> ${escapeHtml(phone2)}</a>
                        <a href="mailto:${email}"><i class="fas fa-envelope"></i> ${escapeHtml(email)}</a>
                        <span><i class="fas fa-globe"></i> Nationalité : ${escapeHtml(nationality)}</span>
                    </div>
                </div>
                <div class="cv-main">
                    <div class="sidebar">
                        <div class="photo-container">
                            <img src="${profilePhotoSrc}" alt="Photo" id="profilePhotoPreview" style="width:140px;height:140px;border-radius:50%;object-fit:cover;">
                            <div><button class="import-photo-btn" id="importPhotoBtnForm"><i class="fas fa-plus"></i></button><input type="file" id="photoUploadForm" accept="image/*" style="display:none;"></div>
                            <p class="photo-hint">Cliquez sur + pour ajouter une photo</p>
                        </div>
                        <div class="section"><h3><i class="fas fa-user-graduate"></i> Profil</h3><p>${escapeHtml(profile)}</p></div>
                        <div class="section"><h3><i class="fas fa-language"></i> Langues</h3>${languagesArray.map(l => `<div>${escapeHtml(l)}</div>`).join('')}<div style="margin-top:8px;"><strong>Dialectes :</strong> ${escapeHtml(dialects)}</div></div>
                        <div class="section"><h3><i class="fas fa-laptop-code"></i> Compétences info</h3>${skillsArray.map(s => `<div>${escapeHtml(s)}</div>`).join('')}</div>
                        <div class="section"><h3><i class="fas fa-heart"></i> Qualités</h3><div class="qualities">${qualitiesArray.map(q => `<span>${escapeHtml(q)}</span>`).join('')}</div></div>
                        <div class="section"><h3><i class="fas fa-car"></i> Permis</h3><p>${escapeHtml(permis)}</p></div>
                    </div>
                    <div class="content">
                        <div class="section"><h3><i class="fas fa-graduation-cap"></i> Formation académique</h3>${educations.map(edu => `<div class="timeline-item"><div class="timeline-title">${escapeHtml(edu.title)} <span class="timeline-date">${escapeHtml(edu.date)}</span></div><div class="timeline-sub">${escapeHtml(edu.institution)}</div></div>`).join('')}</div>
                        <div class="section"><h3><i class="fas fa-briefcase"></i> Expériences professionnelles</h3>${experiences.map(exp => `<div class="timeline-item"><div class="timeline-title">${escapeHtml(exp.title)} <span class="timeline-date">${escapeHtml(exp.date)}</span></div><div class="timeline-sub">${escapeHtml(exp.institution)}</div>${exp.details && exp.details.length ? `<ul class="timeline-desc">${exp.details.map(d => `<li>${escapeHtml(d)}</li>`).join('')}</ul>` : ''}</div>`).join('')}</div>
                        <div class="section"><h3><i class="fas fa-chalkboard-user"></i> Formations complémentaires</h3>${trainings.map(t => `<div class="training-item">${escapeHtml(t)}</div>`).join('')}</div>
                    </div>
                </div>
                <div class="footer-note">Je déclare sur l’honneur l’exactitude des renseignements ci-dessus – Mis à jour le 24 mars 2026</div>
            </div>
        `;
        cvContainer.innerHTML = html;
        const importBtn = document.getElementById('importPhotoBtnForm');
        const photoUpload = document.getElementById('photoUploadForm');
        if (importBtn && photoUpload) {
            importBtn.addEventListener('click', () => photoUpload.click());
            photoUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        profilePhotoSrc = ev.target.result;
                        renderCV();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    }

    function renderFormLists() {
        const expDiv = document.getElementById('experiences-list');
        expDiv.innerHTML = '';
        experiences.forEach((exp, idx) => {
            const card = document.createElement('div'); card.className = 'item-card';
            card.innerHTML = `<div class="item-info"><strong>${escapeHtml(exp.title)}</strong> (${escapeHtml(exp.date)})<br><small>${escapeHtml(exp.institution)}</small></div><button class="btn-icon" onclick="removeExperience(${idx})"><i class="fas fa-trash-alt"></i></button>`;
            expDiv.appendChild(card);
        });
        const eduDiv = document.getElementById('educations-list');
        eduDiv.innerHTML = '';
        educations.forEach((edu, idx) => {
            const card = document.createElement('div'); card.className = 'item-card';
            card.innerHTML = `<div class="item-info"><strong>${escapeHtml(edu.title)}</strong> (${escapeHtml(edu.date)})<br><small>${escapeHtml(edu.institution)}</small></div><button class="btn-icon" onclick="removeEducation(${idx})"><i class="fas fa-trash-alt"></i></button>`;
            eduDiv.appendChild(card);
        });
        const trainDiv = document.getElementById('trainings-list');
        trainDiv.innerHTML = '';
        trainings.forEach((t, idx) => {
            const card = document.createElement('div'); card.className = 'item-card';
            card.innerHTML = `<div class="item-info">${escapeHtml(t)}</div><button class="btn-icon" onclick="removeTraining(${idx})"><i class="fas fa-trash-alt"></i></button>`;
            trainDiv.appendChild(card);
        });
    }

    window.removeExperience = (idx) => { experiences.splice(idx,1); renderFormLists(); renderCV(); };
    window.removeEducation = (idx) => { educations.splice(idx,1); renderFormLists(); renderCV(); };
    window.removeTraining = (idx) => { trainings.splice(idx,1); renderFormLists(); renderCV(); };

    document.getElementById('addExperienceBtn').addEventListener('click', () => {
        let title = prompt("Titre de l'expérience");
        let date = prompt("Période (ex: 2020-2022)");
        let institution = prompt("Institution");
        if(title && date && institution) experiences.push({ title, date, institution, details: [] });
        renderFormLists(); renderCV();
    });
    document.getElementById('addEducationBtn').addEventListener('click', () => {
        let title = prompt("Diplôme / formation");
        let date = prompt("Année ou période");
        let institution = prompt("Établissement");
        if(title && date && institution) educations.push({ title, date, institution });
        renderFormLists(); renderCV();
    });
    document.getElementById('addTrainingBtn').addEventListener('click', () => {
        let txt = prompt("Formation complémentaire (ex: 2020 – Nom du cours, Organisme)");
        if(txt) trainings.push(txt);
        renderFormLists(); renderCV();
    });
    document.getElementById('resetBtn').addEventListener('click', () => { if(confirm("Réinitialiser toutes les données ?")) location.reload(); });

    const inputs = ['fullName','title','address','phone1','phone2','email','nationality','profile','languages','dialects','skills','qualities','permis'];
    inputs.forEach(id => { document.getElementById(id).addEventListener('input', () => renderCV()); });

    function setTheme(theme) {
        if(theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        localStorage.setItem('theme', theme);
        const btn = document.getElementById('themeToggleBtn');
        if(btn) btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i> Clair' : '<i class="fas fa-moon"></i> Sombre';
    }
    document.getElementById('themeToggleBtn').addEventListener('click', () => { setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'); });
    setTheme(currentTheme);

    // Export PDF DIRECT avec html2pdf.js - suppression du bouton + et du texte
    document.getElementById('exportPDFBtn').addEventListener('click', () => {
        const originalElement = document.querySelector('#cvContainer .cv-container');
        if (!originalElement) return;
        const btn = document.getElementById('exportPDFBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Génération...';
        
        // Cloner l'élément pour ne pas modifier l'affichage à l'écran
        const clone = originalElement.cloneNode(true);
        // Supprimer le bouton d'import photo et le texte d'aide
        const photoContainer = clone.querySelector('.photo-container');
        if (photoContainer) {
            const plusBtn = photoContainer.querySelector('.import-photo-btn');
            const hint = photoContainer.querySelector('.photo-hint');
            if (plusBtn) plusBtn.remove();
            if (hint) hint.remove();
        }
        // Ajouter un wrapper avec un léger padding pour éviter les coupures de bord
        const wrapper = document.createElement('div');
        wrapper.style.padding = '0.3cm';
        wrapper.style.backgroundColor = 'white';
        wrapper.appendChild(clone);
        
        const opt = {
            margin:        [1.2, 1.2, 1.2, 1.2], // marges en cm (haut, droite, bas, gauche)
            filename:     'CV_RAHAJASON_Feno_Arthur.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, logging: false, letterRendering: true },
            jsPDF:        { unit: 'cm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(wrapper).save().then(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-file-pdf"></i> Télécharger PDF';
        }).catch(err => {
            console.error(err);
            alert("Erreur lors de l'export: " + err);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-file-pdf"></i> Télécharger PDF';
        });
    });

    document.querySelectorAll('.form-section').forEach(section => {
        const header = section.querySelector('.section-header');
        const content = section.querySelector('.section-content');
        content.classList.add('open');
        header.classList.add('open');
        header.addEventListener('click', () => {
            content.classList.toggle('open');
            header.classList.toggle('open');
        });
    });

    renderFormLists();
    renderCV();
</script>
</body>
</html>
